<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Платформер · Geometry Dash стиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0b1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: pan-y; 
        }
        .game-wrapper {
            background: #1a1a2e;
            padding: 16px 16px 20px;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7);
        }
        canvas {
            display: block;
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 800 / 400;
            background: #16213e;
            border-radius: 24px;
            box-shadow: inset 0 0 0 2px #2a3a6a, 0 10px 20px rgba(0,0,0,0.5);
            touch-action: none;
            margin: 0 auto;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 6px;
            gap: 12px;
        }
        .ctrl-group {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .ctrl-btn {
            background: #2a2a4a;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 #0f0f1f, 0 10px 20px rgba(0,0,0,0.4);
            transition: all 0.04s ease;
            touch-action: manipulation;
            cursor: pointer;
            background: #3c3c6e;
            letter-spacing: 2px;
        }
        .ctrl-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f0f1f;
        }
        .ctrl-btn.jump {
            background: #e94560;
            width: 80px;
            height: 80px;
            font-size: 32px;
            box-shadow: 0 8px 0 #8f1f34;
        }
        .ctrl-btn.jump:active {
            box-shadow: 0 2px 0 #8f1f34;
        }
        .ctrl-btn.arrow {
            background: #2f3b6b;
            width: 65px;
            height: 65px;
            font-size: 36px;
            box-shadow: 0 8px 0 #171f3a;
        }
        .ctrl-btn.arrow:active {
            box-shadow: 0 2px 0 #171f3a;
        }
        .info {
            display: flex;
            justify-content: space-between;
            color: #9aa9d9;
            padding: 10px 12px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .desktop-hint {
            color: #5f6f9f;
            font-size: 14px;
            background: #1e1e3a;
            padding: 10px 18px;
            border-radius: 30px;
            display: inline-block;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }
        @media (max-width: 700px) {
            .ctrl-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .ctrl-btn.jump {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }
            .ctrl-btn.arrow {
                width: 56px;
                height: 56px;
                font-size: 30px;
            }
            .controls {
                gap: 6px;
            }
        }
        @media (pointer: coarse) {
            .desktop-hint {
                display: none;
            }
        }
        @media (pointer: fine) {
            .controls .ctrl-btn {
                display: none;
            }
            .controls {
                justify-content: center;
            }
        }
        /* для очень маленьких экранов */
        @media (max-width: 480px) {
            .ctrl-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            .ctrl-btn.jump {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .ctrl-btn.arrow {
                width: 48px;
                height: 48px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="info">
        <span>⭐ <span id="scoreDisplay">0</span></span>
        <span class="desktop-hint">W / SPACE ↑  A ←  D →</span>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">
        <div class="ctrl-group">
            <button class="ctrl-btn arrow" id="btnLeft">◀</button>
            <button class="ctrl-btn arrow" id="btnRight">▶</button>
        </div>
        <div class="ctrl-group">
            <button class="ctrl-btn jump" id="btnJump">⬆</button>
        </div>
    </div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');

        // фиксированные размеры
        const W = 800, H = 400;

        // ----- ИГРОВЫЕ ПАРАМЕТРЫ (геометри-стайл) -----
        const GRAVITY = 0.55;
        const JUMP_FORCE = -9.5;
        const MOVE_SPEED = 4.8;
        const FRICTION = 0.82;

        // платформы – массив объектов
        let platforms = [];
        // игрок
        let player = {
            x: 80, y: 300,
            w: 22, h: 28,
            vx: 0, vy: 0,
            onGround: false
        };

        // монеты (сборные)
        let coins = [];
        let score = 0;

        // управление (клавиши)
        const keys = {
            left: false,
            right: false,
            jump: false
        };

        // флаг для прыжка (чтобы не спамить)
        let jumpPressed = false;
        let jumpConsumed = false;

        // генерация уровня
        function buildLevel() {
            platforms = [];
            coins = [];
            score = 0;
            updateScore();

            // земля (пол)
            platforms.push({ x: 0, y: 370, w: 800, h: 30, color: '#4a6fa5' });

            // платформы в стиле Geometry Dash – резкие, цветные
            const platData = [
                { x: 140, y: 310, w: 90, h: 18, color: '#f7b731' },
                { x: 300, y: 260, w: 70, h: 18, color: '#20bf6b' },
                { x: 440, y: 200, w: 80, h: 18, color: '#eb3b5a' },
                { x: 580, y: 150, w: 70, h: 18, color: '#8854d0' },
                { x: 680, y: 280, w: 100, h: 18, color: '#2d98da' },
                // дополнительные платформы для сложности
                { x: 30, y: 220, w: 60, h: 16, color: '#f8a5c2' },
                { x: 200, y: 140, w: 65, h: 16, color: '#778beb' },
                { x: 500, y: 320, w: 70, h: 16, color: '#e15f41' },
            ];
            platData.forEach(p => platforms.push(p));

            // монеты (сборные элементы)
            const coinPositions = [
                [180, 285], [250, 230], [350, 180], [470, 125],
                [620, 100], [720, 250], [80, 190], [560, 290],
                [430, 310], [300, 135]
            ];
            coinPositions.forEach(([x, y]) => {
                coins.push({ x, y, r: 9, collected: false });
            });
        }

        // сброс игрока
        function resetPlayer() {
            player.x = 80;
            player.y = 300;
            player.vx = 0;
            player.vy = 0;
            player.onGround = false;
        }

        // обновление счета
        function updateScore() {
            scoreSpan.textContent = score;
        }

        // ------ ФИЗИКА И ОБНОВЛЕНИЕ ------
        function update() {
            // Горизонтальное движение
            if (keys.left) {
                player.vx -= MOVE_SPEED * 0.4;
            }
            if (keys.right) {
                player.vx += MOVE_SPEED * 0.4;
            }
            player.vx *= FRICTION;
            if (Math.abs(player.vx) > MOVE_SPEED) player.vx = MOVE_SPEED * Math.sign(player.vx);
            if (Math.abs(player.vx) < 0.1) player.vx = 0;

            // Прыжок (только если на земле и кнопка нажата)
            if (keys.jump && player.onGround && !jumpConsumed) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
                jumpConsumed = true;
            }
            // если отпустили кнопку прыжка – сбрасываем consumed (для повторного нажатия)
            if (!keys.jump) {
                jumpConsumed = false;
            }

            // Гравитация
            player.vy += GRAVITY;
            if (player.vy > 12) player.vy = 12;

            // Перемещение по X
            player.x += player.vx;
            // Перемещение по Y
            player.y += player.vy;

            // ----- Коллизии с платформами -----
            player.onGround = false;
            for (let plat of platforms) {
                const p = plat;
                // пересечение AABB
                if (player.x < p.x + p.w &&
                    player.x + player.w > p.x &&
                    player.y < p.y + p.h &&
                    player.y + player.h > p.y) {

                    // определяем сторону столкновения
                    const overlapX = Math.min(player.x + player.w - p.x, p.x + p.w - player.x);
                    const overlapY = Math.min(player.y + player.h - p.y, p.y + p.h - player.y);

                    if (overlapX < overlapY) {
                        // столкновение по X
                        if (player.vx > 0) {
                            player.x = p.x - player.w;
                        } else if (player.vx < 0) {
                            player.x = p.x + p.w;
                        }
                        player.vx = 0;
                    } else {
                        // столкновение по Y
                        if (player.vy > 0) {
                            // приземление
                            player.y = p.y - player.h;
                            player.vy = 0;
                            player.onGround = true;
                        } else if (player.vy < 0) {
                            player.y = p.y + p.h;
                            player.vy = 0;
                        }
                    }
                }
            }

            // ----- Сбор монет -----
            for (let coin of coins) {
                if (coin.collected) continue;
                const dx = (player.x + player.w/2) - coin.x;
                const dy = (player.y + player.h/2) - coin.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < coin.r + 16) {
                    coin.collected = true;
                    score++;
                    updateScore();
                }
            }

            // границы мира (не выпадать)
            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x + player.w > W) { player.x = W - player.w; player.vx = 0; }
            if (player.y + player.h > H) {
                player.y = H - player.h;
                player.vy = 0;
                player.onGround = true;
            }
            if (player.y < -100) {
                // если улетел вверх – возвращаем
                player.y = 50;
                player.vy = 2;
            }
        }

        // ------ ОТРИСОВКА (Geometry Dash стиль) ------
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // фон с градиентом
            const grd = ctx.createLinearGradient(0, 0, 0, H);
            grd.addColorStop(0, '#0f1a3a');
            grd.addColorStop(1, '#1a2a5e');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, W, H);

            // линии сетки (как в GD)
            ctx.strokeStyle = '#2f4a7a';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < W; i += 60) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, H);
                ctx.strokeStyle = '#2f4a7a';
                ctx.stroke();
            }
            for (let i = 0; i < H; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(W, i);
                ctx.strokeStyle = '#2f4a7a';
                ctx.stroke();
            }

            // платформы
            for (let p of platforms) {
                ctx.fillStyle = p.color || '#4a6fa5';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.w, p.h, 6);
                ctx.fill();
                // обводка
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#ffffff30';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // монеты (светящиеся)
            for (let coin of coins) {
                if (coin.collected) continue;
                ctx.shadowColor = '#f7d44a';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI*2);
                ctx.fillStyle = '#f9ca24';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#f0932b';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                // блик
                ctx.beginPath();
                ctx.arc(coin.x-3, coin.y-3, 3, 0, Math.PI*2);
                ctx.fillStyle = '#fff9c4';
                ctx.fill();
            }

            // игрок – куб в стиле Geometry Dash
            const p = player;
            ctx.shadowColor = '#3b9eff';
            ctx.shadowBlur = 22;
            // основной куб
            ctx.fillStyle = '#3b9eff';
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.w, p.h, 5);
            ctx.fill();
            // обводка
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#ffffff80';
            ctx.lineWidth = 3;
            ctx.stroke();
            // глаза (стиль GD)
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(p.x + 6, p.y + 8, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x + 16, p.y + 8, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(p.x + 5, p.y + 6, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x + 15, p.y + 6, 2.5, 0, Math.PI*2);
            ctx.fill();
            // рот (линия)
            ctx.beginPath();
            ctx.moveTo(p.x + 5, p.y + 18);
            ctx.lineTo(p.x + 17, p.y + 18);
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // сброс тени
            ctx.shadowBlur = 0;
        }

        // helper roundRect
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (r > w/2) r = w/2;
            if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };

        // ----- ИГРОВОЙ ЦИКЛ -----
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ----- УПРАВЛЕНИЕ С КЛАВИАТУРЫ -----
        function keyDownHandler(e) {
            const key = e.key;
            if (key === 'w' || key === 'W' || key === ' ') {
                e.preventDefault();
                keys.jump = true;
                jumpPressed = true;
            }
            if (key === 'a' || key === 'A') {
                e.preventDefault();
                keys.left = true;
            }
            if (key === 'd' || key === 'D') {
                e.preventDefault();
                keys.right = true;
            }
        }
        function keyUpHandler(e) {
            const key = e.key;
            if (key === 'w' || key === 'W' || key === ' ') {
                e.preventDefault();
                keys.jump = false;
                jumpPressed = false;
            }
            if (key === 'a' || key === 'A') {
                e.preventDefault();
                keys.left = false;
            }
            if (key === 'd' || key === 'D') {
                e.preventDefault();
                keys.right = false;
            }
        }

        // ----- СЕНСОРНЫЕ КНОПКИ (телефон) -----
        function setupTouchControls() {
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');

            function attachTouch(btn, onStart, onEnd) {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    onStart();
                }, { passive: false });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    onEnd();
                }, { passive: false });
                btn.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    onEnd();
                }, { passive: false });
                // мышь (для отладки на ПК, но кнопки скрыты на ПК)
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    onStart();
                });
                btn.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    onEnd();
                });
                btn.addEventListener('mouseleave', (e) => {
                    onEnd();
                });
            }

            attachTouch(btnLeft, 
                () => { keys.left = true; },
                () => { keys.left = false; }
            );
            attachTouch(btnRight,
                () => { keys.right = true; },
                () => { keys.right = false; }
            );
            attachTouch(btnJump,
                () => { keys.jump = true; jumpConsumed = false; },
                () => { keys.jump = false; }
            );
        }

        // ----- ИНИЦИАЛИЗАЦИЯ -----
        function init() {
            buildLevel();
            resetPlayer();

            // клавиатура
            window.addEventListener('keydown', keyDownHandler);
            window.addEventListener('keyup', keyUpHandler);

            // сенсорные кнопки
            setupTouchControls();

            // запрет скролла на телефоне
            canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
            canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

            // запуск
            gameLoop();
        }

        init();

        // перезапуск уровня по нажатию R (для удобства)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                buildLevel();
                resetPlayer();
                score = 0;
                updateScore();
            }
        });

    })();
</script>
</body>
</html>
