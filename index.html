<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Платформер · Geometry Dash стиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0b1a;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: pan-y;
            padding: 8px;
            overflow: hidden;
        }
        .game-wrapper {
            background: #1a1a2e;
            padding: 10px 10px 14px;
            border-radius: 28px 28px 20px 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 800 / 400;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 0 2px #2a3a6a, 0 10px 20px rgba(0,0,0,0.5);
            flex-shrink: 0;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #16213e;
            touch-action: none;
        }
        .info {
            display: flex;
            justify-content: space-between;
            color: #9aa9d9;
            padding: 6px 10px 4px;
            font-weight: 500;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }
        .desktop-hint {
            color: #5f6f9f;
            font-size: 13px;
            background: #1e1e3a;
            padding: 6px 14px;
            border-radius: 30px;
            display: inline-block;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        /* === КНОПКИ ПОВЕРХ ИГРЫ === */
        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .touch-overlay .ctrl-group {
            position: absolute;
            display: flex;
            gap: 12px;
            align-items: center;
            pointer-events: none;
        }
        .touch-overlay .ctrl-group .ctrl-btn {
            pointer-events: auto;
            touch-action: manipulation;
            cursor: pointer;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.04s ease;
            -webkit-touch-callout: none;
            background: rgba(44, 44, 80, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.5);
        }
        .touch-overlay .ctrl-group .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.4);
        }
        .touch-overlay .ctrl-group .ctrl-btn.arrow {
            width: 60px;
            height: 60px;
            font-size: 32px;
            background: rgba(47, 59, 107, 0.85);
        }
        .touch-overlay .ctrl-group .ctrl-btn.jump {
            width: 72px;
            height: 72px;
            font-size: 30px;
            background: rgba(233, 69, 96, 0.9);
            border-color: rgba(255,255,255,0.25);
            box-shadow: 0 6px 0 rgba(143, 31, 52, 0.6), 0 8px 20px rgba(0,0,0,0.5);
        }
        .touch-overlay .ctrl-group .ctrl-btn.jump:active {
            box-shadow: 0 2px 0 rgba(143, 31, 52, 0.6);
        }
        .touch-overlay .ctrl-group.left-group {
            bottom: 16px;
            left: 16px;
            pointer-events: none;
        }
        .touch-overlay .ctrl-group.right-group {
            bottom: 16px;
            right: 16px;
            pointer-events: none;
        }

        /* Адаптация кнопок под размер экрана */
        @media (max-width: 600px) {
            .touch-overlay .ctrl-group .ctrl-btn.arrow {
                width: 50px;
                height: 50px;
                font-size: 26px;
            }
            .touch-overlay .ctrl-group .ctrl-btn.jump {
                width: 62px;
                height: 62px;
                font-size: 26px;
            }
            .touch-overlay .ctrl-group {
                gap: 10px;
            }
            .touch-overlay .ctrl-group.left-group {
                bottom: 12px;
                left: 12px;
            }
            .touch-overlay .ctrl-group.right-group {
                bottom: 12px;
                right: 12px;
            }
        }
        @media (max-width: 480px) {
            .touch-overlay .ctrl-group .ctrl-btn.arrow {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            .touch-overlay .ctrl-group .ctrl-btn.jump {
                width: 54px;
                height: 54px;
                font-size: 22px;
            }
            .touch-overlay .ctrl-group {
                gap: 8px;
            }
            .touch-overlay .ctrl-group.left-group {
                bottom: 10px;
                left: 10px;
            }
            .touch-overlay .ctrl-group.right-group {
                bottom: 10px;
                right: 10px;
            }
        }
        @media (max-width: 400px) {
            .touch-overlay .ctrl-group .ctrl-btn.arrow {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
            .touch-overlay .ctrl-group .ctrl-btn.jump {
                width: 46px;
                height: 46px;
                font-size: 18px;
            }
            .touch-overlay .ctrl-group {
                gap: 6px;
            }
        }

        @media (pointer: fine) {
            .touch-overlay {
                display: none;
            }
        }

        /* Горизонтальная ориентация */
        @media (orientation: landscape) and (max-height: 500px) {
            body {
                padding: 4px 6px;
                align-items: stretch;
            }
            .game-wrapper {
                padding: 6px 8px 8px;
                border-radius: 16px;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
                max-width: 100%;
                background: transparent;
                box-shadow: none;
            }
            .canvas-container {
                flex: 1 1 60%;
                min-width: 240px;
                aspect-ratio: 800 / 400;
                border-radius: 14px;
                box-shadow: inset 0 0 0 2px #2a3a6a, 0 6px 12px rgba(0,0,0,0.5);
            }
            .info {
                width: 100%;
                padding: 2px 6px 0;
                font-size: 13px;
                order: -1;
            }
            .desktop-hint {
                font-size: 11px;
                padding: 4px 10px;
            }
            .touch-overlay .ctrl-group.left-group {
                bottom: 10px;
                left: 10px;
            }
            .touch-overlay .ctrl-group.right-group {
                bottom: 10px;
                right: 10px;
            }
            .touch-overlay .ctrl-group .ctrl-btn.arrow {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            .touch-overlay .ctrl-group .ctrl-btn.jump {
                width: 54px;
                height: 54px;
                font-size: 22px;
            }
            .touch-overlay .ctrl-group {
                gap: 8px;
            }
        }
        @media (orientation: landscape) and (max-height: 400px) {
            .touch-overlay .ctrl-group .ctrl-btn.arrow {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .touch-overlay .ctrl-group .ctrl-btn.jump {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            .touch-overlay .ctrl-group {
                gap: 6px;
            }
            .touch-overlay .ctrl-group.left-group {
                bottom: 6px;
                left: 6px;
            }
            .touch-overlay .ctrl-group.right-group {
                bottom: 6px;
                right: 6px;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="info">
        <span>⭐ <span id="scoreDisplay">0</span></span>
        <span class="desktop-hint">W / SPACE ↑  A ←  D →</span>
    </div>
    <div class="canvas-container" id="canvasContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <!-- Кнопки поверх игры -->
        <div class="touch-overlay" id="touchOverlay">
            <div class="ctrl-group left-group">
                <button class="ctrl-btn arrow" id="btnLeft">◀</button>
                <button class="ctrl-btn arrow" id="btnRight">▶</button>
            </div>
            <div class="ctrl-group right-group">
                <button class="ctrl-btn jump" id="btnJump">⬆</button>
            </div>
        </div>
    </div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const container = document.getElementById('canvasContainer');

        const W = 800, H = 400;

        const GRAVITY = 0.55;
        const JUMP_FORCE = -9.5;
        const MOVE_SPEED = 4.8;
        const FRICTION = 0.82;

        let platforms = [];
        let player = {
            x: 80, y: 300,
            w: 22, h: 28,
            vx: 0, vy: 0,
            onGround: false
        };

        let coins = [];
        let score = 0;

        const keys = {
            left: false,
            right: false,
            jump: false
        };

        let jumpConsumed = false;

        function buildLevel() {
            platforms = [];
            coins = [];
            score = 0;
            updateScore();

            platforms.push({ x: 0, y: 370, w: 800, h: 30, color: '#4a6fa5' });

            const platData = [
                { x: 140, y: 310, w: 90, h: 18, color: '#f7b731' },
                { x: 300, y: 260, w: 70, h: 18, color: '#20bf6b' },
                { x: 440, y: 200, w: 80, h: 18, color: '#eb3b5a' },
                { x: 580, y: 150, w: 70, h: 18, color: '#8854d0' },
                { x: 680, y: 280, w: 100, h: 18, color: '#2d98da' },
                { x: 30, y: 220, w: 60, h: 16, color: '#f8a5c2' },
                { x: 200, y: 140, w: 65, h: 16, color: '#778beb' },
                { x: 500, y: 320, w: 70, h: 16, color: '#e15f41' },
            ];
            platData.forEach(p => platforms.push(p));

            const coinPositions = [
                [180, 285], [250, 230], [350, 180], [470, 125],
                [620, 100], [720, 250], [80, 190], [560, 290],
                [430, 310], [300, 135]
            ];
            coinPositions.forEach(([x, y]) => {
                coins.push({ x, y, r: 9, collected: false });
            });
        }

        function resetPlayer() {
            player.x = 80;
            player.y = 300;
            player.vx = 0;
            player.vy = 0;
            player.onGround = false;
        }

        function updateScore() {
            scoreSpan.textContent = score;
        }

        function update() {
            if (keys.left) {
                player.vx -= MOVE_SPEED * 0.4;
            }
            if (keys.right) {
                player.vx += MOVE_SPEED * 0.4;
            }
            player.vx *= FRICTION;
            if (Math.abs(player.vx) > MOVE_SPEED) player.vx = MOVE_SPEED * Math.sign(player.vx);
            if (Math.abs(player.vx) < 0.1) player.vx = 0;

            if (keys.jump && player.onGround && !jumpConsumed) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
                jumpConsumed = true;
            }
            if (!keys.jump) {
                jumpConsumed = false;
            }

            player.vy += GRAVITY;
            if (player.vy > 12) player.vy = 12;

            player.x += player.vx;
            player.y += player.vy;

            player.onGround = false;
            for (let plat of platforms) {
                const p = plat;
                if (player.x < p.x + p.w &&
                    player.x + player.w > p.x &&
                    player.y < p.y + p.h &&
                    player.y + player.h > p.y) {

                    const overlapX = Math.min(player.x + player.w - p.x, p.x + p.w - player.x);
                    const overlapY = Math.min(player.y + player.h - p.y, p.y + p.h - player.y);

                    if (overlapX < overlapY) {
                        if (player.vx > 0) {
                            player.x = p.x - player.w;
                        } else if (player.vx < 0) {
                            player.x = p.x + p.w;
                        }
                        player.vx = 0;
                    } else {
                        if (player.vy > 0) {
                            player.y = p.y - player.h;
                            player.vy = 0;
                            player.onGround = true;
                        } else if (player.vy < 0) {
                            player.y = p.y + p.h;
                            player.vy = 0;
                        }
                    }
                }
            }

            for (let coin of coins) {
                if (coin.collected) continue;
                const dx = (player.x + player.w/2) - coin.x;
                const dy = (player.y + player.h/2) - coin.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < coin.r + 16) {
                    coin.collected = true;
                    score++;
                    updateScore();
                }
            }

            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x + player.w > W) { player.x = W - player.w; player.vx = 0; }
            if (player.y + player.h > H) {
                player.y = H - player.h;
                player.vy = 0;
                player.onGround = true;
            }
            if (player.y < -100) {
                player.y = 50;
                player.vy = 2;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grd = ctx.createLinearGradient(0, 0, 0, H);
            grd.addColorStop(0, '#0f1a3a');
            grd.addColorStop(1, '#1a2a5e');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, W, H);

            ctx.strokeStyle = '#2f4a7a';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < W; i += 60) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, H);
                ctx.strokeStyle = '#2f4a7a';
                ctx.stroke();
            }
            for (let i = 0; i < H; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(W, i);
                ctx.strokeStyle = '#2f4a7a';
                ctx.stroke();
            }

            for (let p of platforms) {
                ctx.fillStyle = p.color || '#4a6fa5';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.w, p.h, 6);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#ffffff30';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            for (let coin of coins) {
                if (coin.collected) continue;
                ctx.shadowColor = '#f7d44a';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI*2);
                ctx.fillStyle = '#f9ca24';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#f0932b';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(coin.x-3, coin.y-3, 3, 0, Math.PI*2);
                ctx.fillStyle = '#fff9c4';
                ctx.fill();
            }

            const p = player;
            ctx.shadowColor = '#3b9eff';
            ctx.shadowBlur = 22;
            ctx.fillStyle = '#3b9eff';
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.w, p.h, 5);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#ffffff80';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(p.x + 6, p.y + 8, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x + 16, p.y + 8, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(p.x + 5, p.y + 6, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x + 15, p.y + 6, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(p.x + 5, p.y + 18);
            ctx.lineTo(p.x + 17, p.y + 18);
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (r > w/2) r = w/2;
            if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function keyDownHandler(e) {
            const key = e.key;
            if (key === 'w' || key === 'W' || key === ' ') {
                e.preventDefault();
                keys.jump = true;
            }
            if (key === 'a' || key === 'A') {
                e.preventDefault();
                keys.left = true;
            }
            if (key === 'd' || key === 'D') {
                e.preventDefault();
                keys.right = true;
            }
        }
        function keyUpHandler(e) {
            const key = e.key;
            if (key === 'w' || key === 'W' || key === ' ') {
                e.preventDefault();
                keys.jump = false;
            }
            if (key === 'a' || key === 'A') {
                e.preventDefault();
                keys.left = false;
            }
            if (key === 'd' || key === 'D') {
                e.preventDefault();
                keys.right = false;
            }
        }

        function setupTouchControls() {
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');

            function attachTouch(btn, onStart, onEnd) {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    onStart();
                }, { passive: false });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    onEnd();
                }, { passive: false });
                btn.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    onEnd();
                }, { passive: false });
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    onStart();
                });
                btn.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    onEnd();
                });
                btn.addEventListener('mouseleave', (e) => {
                    onEnd();
                });
            }

            attachTouch(btnLeft, 
                () => { keys.left = true; },
                () => { keys.left = false; }
            );
            attachTouch(btnRight,
                () => { keys.right = true; },
                () => { keys.right = false; }
            );
            attachTouch(btnJump,
                () => { keys.jump = true; jumpConsumed = false; },
                () => { keys.jump = false; }
            );
        }

        function init() {
            buildLevel();
            resetPlayer();

            window.addEventListener('keydown', keyDownHandler);
            window.addEventListener('keyup', keyUpHandler);

            setupTouchControls();

            canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
            canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

            gameLoop();
        }

        init();

        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                buildLevel();
                resetPlayer();
                score = 0;
                updateScore();
            }
        });

    })();
</script>
</body>
</html>
